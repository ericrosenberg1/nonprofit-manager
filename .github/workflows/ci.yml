name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  # Opt in to Node.js 24 ahead of GitHub's forced cutover on 2026-06-02.
  # Remove once the actions used here ship versions that default to Node.js 24.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  php-lint:
    name: PHP Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: none
          coverage: none
      - name: Check PHP syntax
        run: find . -name "*.php" -not -path "./vendor/*" | xargs -n1 php -l

  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer, cs2pr
          coverage: none
      - name: Install PHPCS + WordPress standards
        run: |
          composer global config allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require \
            squizlabs/php_codesniffer \
            wp-coding-standards/wpcs \
            phpcompatibility/phpcompatibility-wp
          phpcs --config-set installed_paths \
            $(composer global config home)/vendor/wp-coding-standards/wpcs,\
            $(composer global config home)/vendor/phpcompatibility/phpcompatibility-wp
      - name: Run PHPCS (WordPress standard)
        # Non-blocking on initial run — WP coding standards violations likely exist;
        # tracked for cleanup. Errors show inline on PRs via cs2pr.
        continue-on-error: true
        run: |
          phpcs --standard=WordPress \
            --extensions=php \
            --ignore=vendor/ \
            --report=checkstyle \
            . | cs2pr
